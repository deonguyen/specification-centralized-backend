version: '3.8'

services:
  admin:
    build:
      context: .
      dockerfile: specification_centralized_admin_project/Dockerfile.dev
    container_name: specification-centralized-admin-dev
    volumes:
      - .:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
    env_file:
      - specification_centralized_admin_project/.env.dev
    command: >
      sh -c "python specification_centralized_admin_project/manage.py collectstatic --noinput &&
             python specification_centralized_admin_project/manage.py runserver 0.0.0.0:5001"
    networks:
      - envoy-network

  auth:
    build:
      context: .
      dockerfile: specification_centralized_auth_project/Dockerfile.dev
    container_name: specification-centralized-auth-dev
    volumes:
      - .:/usr/src/app
    env_file:
      - specification_centralized_auth_project/.env.dev
    networks:
      - envoy-network

  static-server:
    image: nginx:1.25-alpine
    container_name: static-server-dev
    volumes:
      - static_volume:/usr/src/app/staticfiles:ro # Mount static files read-only
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - envoy-network

  spec-api:
    build:
      context: .
      dockerfile: specification_centralized_spec_project/Dockerfile.dev
    container_name: specification-centralized-spec-dev
    volumes:
      - .:/usr/src/app
    env_file:
      - specification_centralized_spec_project/.env.dev
    networks:
      - envoy-network
      
  envoy:
    image: envoyproxy/envoy:v1.30-latest
    container_name: envoy-proxy-dev
    depends_on:
      - admin
      - auth
      - static-server
      - spec-api
    ports:
      - "8082:8082" # HTTP Proxy
      - "9901:9901" # Admin
    volumes:
      - ./envoy.dev.yml:/etc/envoy/envoy.yaml:ro
      - ./start-envoy.sh:/usr/local/bin/start-envoy.sh:ro
    command: ["/bin/sh", "/usr/local/bin/start-envoy.sh"]
    networks:
      - envoy-network

networks:
  envoy-network:
    driver: bridge

volumes:
  static_volume:
    driver: local